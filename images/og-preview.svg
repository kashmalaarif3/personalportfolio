<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1b2a"/>
      <stop offset="55%" stop-color="#1a1020"/>
      <stop offset="100%" stop-color="#0d1b2a"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#c0152a" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#c0152a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c0152a"/>
      <stop offset="50%" stop-color="#e02040"/>
      <stop offset="100%" stop-color="#c0152a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Subtle grid lines -->
  <g stroke="rgba(192,21,42,0.06)" stroke-width="1">
    <line x1="0" y1="90"  x2="1200" y2="90"/>
    <line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="270" x2="1200" y2="270"/>
    <line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="450" x2="1200" y2="450"/>
    <line x1="0" y1="540" x2="1200" y2="540"/>
    <line x1="150" y1="0" x2="150" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="450" y1="0" x2="450" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="750" y1="0" x2="750" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="1050" y1="0" x2="1050" y2="630"/>
  </g>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="5" fill="url(#accent)"/>

  <!-- Laptop icon (simplified) -->
  <g transform="translate(600, 185)" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
    <!-- Screen -->
    <rect x="-70" y="-52" width="140" height="92" rx="8" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.2)"/>
    <!-- Screen content lines -->
    <line x1="-45" y1="-28" x2="45" y2="-28" stroke="rgba(192,21,42,0.6)" stroke-width="4"/>
    <line x1="-45" y1="-10" x2="20" y2="-10" stroke="rgba(255,255,255,0.15)" stroke-width="3"/>
    <line x1="-45" y1="6" x2="30" y2="6" stroke="rgba(255,255,255,0.15)" stroke-width="3"/>
    <!-- Hinge -->
    <line x1="-70" y1="40" x2="70" y2="40" stroke="rgba(255,255,255,0.25)" stroke-width="5"/>
    <!-- Base -->
    <path d="M-88 40 L-70 52 L70 52 L88 40" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.2)" stroke-width="5"/>
    <!-- Trackpad -->
    <rect x="-18" y="44" width="36" height="4" rx="2" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>
  </g>

  <!-- KA Monogram -->
  <text x="600" y="395"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="168"
    font-weight="bold"
    font-style="italic"
    fill="white"
    text-anchor="middle"
    letter-spacing="-4"
    filter="url(#shadow)">KA</text>

  <!-- Glow behind KA -->
  <ellipse cx="600" cy="370" rx="200" ry="60" fill="rgba(192,21,42,0.2)"/>
  <text x="600" y="395"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="168"
    font-weight="bold"
    font-style="italic"
    fill="white"
    text-anchor="middle"
    letter-spacing="-4">KA</text>

  <!-- Divider line -->
  <rect x="480" y="415" width="240" height="2" rx="1" fill="url(#accent)" opacity="0.8"/>

  <!-- Name -->
  <text x="600" y="460"
    font-family="Arial, Helvetica, sans-serif"
    font-size="28"
    font-weight="700"
    fill="rgba(255,255,255,0.9)"
    text-anchor="middle"
    letter-spacing="4">KASHMALA ARIF</text>

  <!-- Tagline -->
  <text x="600" y="500"
    font-family="Arial, Helvetica, sans-serif"
    font-size="18"
    fill="rgba(255,255,255,0.38)"
    text-anchor="middle"
    letter-spacing="2">Data Scientist · Product Analyst · AI Enthusiast</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="625" width="1200" height="5" fill="url(#accent)"/>
</svg>
